name: CD - Deploy to Lab Host

# Deploys by SSHing into the EC2 box, pulling latest source, and rebuilding
# the Compose stack locally on the box. Triggered manually (safer for a
# lab/thesis environment than auto-deploy on every push) — change to
# `workflow_run: {workflows: ["CI - Build, Test, Push"], types: [completed]}`
# once you trust the pipeline enough to go fully hands-off.
#
# NOTE: this builds images from source on the target box rather than pulling
# prebuilt images from GHCR. ci.yml does push images to GHCR (useful as a
# build cache / for scanning / for other consumers), but docker-compose.yml
# is written with local `build:` blocks, not registry image references, so
# `docker compose pull` has nothing to pull. Rebuilding server-side is slower
# per deploy but matches how this stack has actually been run and tested —
# switching to registry-pull deploys is a valid future improvement, not a
# correctness requirement right now.

on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy over SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.LAB_SSH_PRIVATE_KEY }}
          LAB_HOST: ${{ secrets.LAB_HOST_IP }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$LAB_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key ubuntu@"$LAB_HOST" bash -s <<'INNEREOF'
            set -euo pipefail
            cd /opt/devops-lab
            git pull origin main
            docker compose up -d --build --remove-orphans
            docker image prune -f
          INNEREOF

      - name: Smoke test
        env:
          LAB_HOST: ${{ secrets.LAB_HOST_IP }}
        run: |
          sleep 15
          curl -fsk "https://$LAB_HOST/python/health" || (echo "python route failed" && exit 1)
          curl -fsk "https://$LAB_HOST/node/health"   || (echo "node route failed" && exit 1)
          curl -fsk "https://$LAB_HOST/java/health"   || (echo "java route failed" && exit 1)
          echo "All three routes healthy."
