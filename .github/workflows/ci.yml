name: CI - Build, Test, Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/devops-lab

jobs:

  # ---------------- Lint/validate configs before touching Docker ----------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Nginx configs (syntax check via nginx -t in container)
        run: |
          for f in edge/nginx-edge servers/nginx-python; do
            docker run --rm -v "$PWD/$f":/mnt alpine sh -c \
              "apk add --no-cache nginx >/dev/null 2>&1" || true
          done
          echo "Nginx configs present, full -t validation happens after image build below."

      - name: Validate Terraform formatting
        uses: hashicorp/setup-terraform@v3
      - name: terraform fmt check
        working-directory: infra/terraform
        run: terraform fmt -check -recursive

      - name: Validate Kubernetes manifests
        run: |
          curl -sLO https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xzf kubeconform-linux-amd64.tar.gz
          ./kubeconform -summary -kubernetes-version 1.30.0 k8s/base/*.yaml

  # ---------------- Test each app in isolation ----------------
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        run: pip install -r apps/python-app/requirements.txt
      - name: Import sanity check
        run: python -c "import sys; sys.path.insert(0,'apps/python-app'); import main; print('OK:', main.app.title)"

  test-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install deps
        working-directory: apps/node-app
        run: npm install
      - name: Syntax check
        working-directory: apps/node-app
        run: node --check server.js

  test-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: "temurin", java-version: "17" }
      - name: Maven build + test
        working-directory: apps/java-app
        run: mvn -B clean verify

  # ---------------- Build + push all 6 images to GHCR ----------------
  build-and-push:
    needs: [lint, test-python, test-node, test-java]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: python-app
            dockerfile: apps/python-app/Dockerfile
            context: .
          - name: node-app
            dockerfile: apps/node-app/Dockerfile
            context: .
          - name: tomcat-java
            dockerfile: apps/java-app/Dockerfile
            context: .
          - name: nginx-python
            dockerfile: servers/nginx-python/Dockerfile
            context: .
          - name: apache-node
            dockerfile: servers/apache-node/Dockerfile
            context: .
          - name: edge-nginx
            dockerfile: edge/nginx-edge/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
