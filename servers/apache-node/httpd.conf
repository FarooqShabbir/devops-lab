# Apache httpd reverse-proxy config: front the Node.js app server.
# In docker-compose, "node-app" resolves via the internal Docker DNS.

ServerName apache-node

ProxyPreserveHost On
ProxyRequests Off

<Proxy *>
    Require all granted
</Proxy>

# Forward every request to the Node.js container on its internal port
ProxyPass "/" "http://node-app:3000/"
ProxyPassReverse "/" "http://node-app:3000/"

# Trust X-Forwarded-* from the edge Nginx layer upstream
RemoteIPHeader X-Forwarded-For
RemoteIPInternalProxy 172.16.0.0/12 10.0.0.0/8 192.168.0.0/16

Header set X-Served-By "apache-httpd"

# Access log for observability (promtail tails this)
LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" combined
CustomLog /proc/self/fd/1 combined
ErrorLog /proc/self/fd/2
