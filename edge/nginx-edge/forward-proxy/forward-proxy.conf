# ============================================================================
# FORWARD PROXY
# Distinct from everything above: a reverse proxy hides/routes to servers on
# behalf of clients (what conf.d/*.conf does). A FORWARD proxy sits in front
# of CLIENTS and fetches external resources on their behalf, e.g. a client
# inside this Docker network configures its browser/curl to use
# http://edge-nginx:8888 as its HTTP proxy to reach the outside world.
#
# Nginx isn't a general CONNECT-tunnel proxy out of the box (that needs
# nginx built with ngx_http_proxy_connect_module, or Squid). Stock Nginx CAN
# do plain-HTTP forward proxying via resolver + proxy_pass on $http_host,
# which is what's implemented here — sufficient to demonstrate the forward
# proxy concept end-to-end for HTTP targets. docs/forward-proxy-notes.md
# explains the HTTPS/CONNECT limitation and the Squid drop-in alternative.
# ============================================================================

server {
    listen 8888;
    resolver 127.0.0.11 ipv6=off;  # Docker's embedded DNS resolver

    location / {
        limit_req zone=fwdproxy burst=10 nodelay;

        # Only forward plain HTTP requests (client sends absolute-URI in request line)
        proxy_pass $scheme://$http_host$request_uri;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffers 16 4k;
        proxy_set_header Connection "";
    }
}
