user  nginx;
worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main_ext '$remote_addr - $remote_user [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_referer" "$http_user_agent" '
                         'vhost=$host upstream=$upstream_addr rt=$request_time';

    access_log /dev/stdout main_ext;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    gzip  on;

    # Rate limiting zone for forward proxy (basic abuse protection)
    limit_req_zone $binary_remote_addr zone=fwdproxy:10m rate=30r/s;

    # --- Virtual hosts / reverse proxy / routing / SSL ---
    include /etc/nginx/conf.d/*.conf;

    # --- Forward proxy (separate server block, separate port: 8888) ---
    include /etc/nginx/forward-proxy.conf;
}
