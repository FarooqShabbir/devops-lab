# ============================================================================
# VIRTUAL HOSTING: one dedicated server_name (subdomain) per app.
# This is the classic Nginx "virtual hosting" deliverable — distinct from the
# URL-based routing above, which lives on a single domain. Here each app gets
# its own logical host, all still terminating TLS with the same cert (SAN
# covers each subdomain — see gen-self-signed-cert.sh).
# ============================================================================

server {
    listen 443 ssl;
    http2 on;
    server_name python.lab.local;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    location / {
        proxy_pass http://python_upstream/;
        include /etc/nginx/conf.d/proxy-common.inc;
        add_header X-Route "vhost:python.lab.local" always;
    }
}

