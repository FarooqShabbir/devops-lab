# Upstream definitions for all three backend app-servers.
# Each app-server (nginx-python, apache-node, tomcat-java) already fronts its
# own app; the edge only ever talks to these three, never to the raw apps.

upstream python_upstream {
    server nginx-python:80;
    keepalive 16;
}

upstream node_upstream {
    server apache-node:80;
    keepalive 16;
}

upstream java_upstream {
    server tomcat-java:8080;
    keepalive 16;
}
