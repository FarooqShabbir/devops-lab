# ============================================================================
# PRIMARY DOMAIN VHOST: lab.local
# Demonstrates:
#   - Domain configuration with the application (server_name + SSL)
#   - SSL certificate deployment (self-signed for lab; swap for Let's Encrypt)
#   - Context-based / URL-based routing: /python/*, /node/*, /java/* all route
#     to different backends from ONE domain, based on URL path (context).
# ============================================================================

# Plain-health endpoint for the container's own HEALTHCHECK (stays on :80, no redirect)
server {
    listen 80;
    server_name _;
    location = /edge-health {
        access_log off;
        return 200 "edge-ok\n";
        add_header Content-Type text/plain;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name lab.local www.lab.local;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # --- Landing page: quick index of the URL-based routes ---
    location = / {
        default_type text/html;
        return 200 '<html><body style="font-family:sans-serif">
<h2>DevOps Lab Edge Router (lab.local)</h2>
<ul>
<li><a href="/python/">/python/</a> &rarr; Nginx server &rarr; FastAPI app</li>
<li><a href="/node/">/node/</a> &rarr; Apache httpd server &rarr; Express app</li>
<li><a href="/java/">/java/</a> &rarr; Tomcat server &rarr; Java servlet app</li>
</ul>
<p>Subdomain-based (context) routing also available: python.lab.local, node.lab.local, java.lab.local</p>
</body></html>';
    }

    # --- URL-BASED ROUTING: /python/* -> Nginx-fronted Python app ---
    location /python/ {
        proxy_pass http://python_upstream/;   # trailing slash strips the /python prefix
        include /etc/nginx/conf.d/proxy-common.inc;
        add_header X-Route "url-based:/python" always;
    }

    # --- URL-BASED ROUTING: /node/* -> Apache-fronted Node app ---
    location /node/ {
        proxy_pass http://node_upstream/;
        include /etc/nginx/conf.d/proxy-common.inc;
        add_header X-Route "url-based:/node" always;
    }

    # --- URL-BASED ROUTING: /java/* -> Tomcat-fronted Java app ---
    location /java/ {
        proxy_pass http://java_upstream/;
        include /etc/nginx/conf.d/proxy-common.inc;
        add_header X-Route "url-based:/java" always;
    }

    # --- CONTEXT-BASED ROUTING example: route by request header instead of path ---
    # A client can hit /api/ on the bare domain and get routed by an
    # X-App-Context header, demonstrating context-based (not just path-based)
    # routing distinct from the URL-based routing above.
    location /api/ {
        set $context_backend python_upstream;
        if ($http_x_app_context = "node") {
            set $context_backend node_upstream;
        }
        if ($http_x_app_context = "java") {
            set $context_backend java_upstream;
        }
        proxy_pass http://$context_backend/;
        include /etc/nginx/conf.d/proxy-common.inc;
        add_header X-Route "context-based:$http_x_app_context" always;
    }
}
