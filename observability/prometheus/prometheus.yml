global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    lab: devops-lab

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # App-level custom metrics (app_requests_total, app_request_latency_seconds)
  - job_name: "python-app"
    metrics_path: /metrics
    static_configs:
      - targets: ["python-app:8000"]
        labels: { app: "python-app", stack: "python" }

  - job_name: "node-app"
    metrics_path: /metrics
    static_configs:
      - targets: ["node-app:3000"]
        labels: { app: "node-app", stack: "node" }

  - job_name: "java-app"
    metrics_path: /metrics
    static_configs:
      - targets: ["tomcat-java:8080"]
        labels: { app: "java-app", stack: "java" }

  # Container-level resource metrics
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
