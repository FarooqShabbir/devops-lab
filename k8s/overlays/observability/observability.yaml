apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: devops-lab
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: python-app
        metrics_path: /metrics
        static_configs: [{ targets: ["python-app-svc:8000"] }]
      - job_name: node-app
        metrics_path: /metrics
        static_configs: [{ targets: ["node-app-svc:3000"] }]
      - job_name: java-app
        metrics_path: /metrics
        static_configs: [{ targets: ["tomcat-java-svc:8080"] }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: devops-lab
spec:
  replicas: 1
  selector: { matchLabels: { app: prometheus } }
  template:
    metadata: { labels: { app: prometheus } }
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=2d"]
          ports: [{ containerPort: 9090 }]
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus }
      volumes:
        - name: config
          configMap: { name: prometheus-config }
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-svc
  namespace: devops-lab
spec:
  type: NodePort
  selector: { app: prometheus }
  ports: [{ port: 9090, targetPort: 9090, nodePort: 30909 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: devops-lab
spec:
  replicas: 1
  selector: { matchLabels: { app: grafana } }
  template:
    metadata: { labels: { app: grafana } }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          env:
            - { name: GF_SECURITY_ADMIN_USER, value: admin }
            - { name: GF_SECURITY_ADMIN_PASSWORD, value: admin }
          ports: [{ containerPort: 3000 }]
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-svc
  namespace: devops-lab
spec:
  type: NodePort
  selector: { app: grafana }
  ports: [{ port: 3000, targetPort: 3000, nodePort: 30300 }]
