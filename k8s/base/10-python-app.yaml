apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app
  namespace: devops-lab
  labels: { app: python-app, stack: python }
spec:
  replicas: 1
  selector:
    matchLabels: { app: python-app }
  template:
    metadata:
      labels: { app: python-app, stack: python }
    spec:
      containers:
        - name: python-app
          image: devops-lab/python-app:local
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8000 }]
          env:
            - { name: APP_ENV, value: "production" }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "250m", memory: "128Mi" }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: python-app
  namespace: devops-lab
spec:
  selector: { app: python-app }
  ports:
    - { port: 8000, targetPort: 8000 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-python
  namespace: devops-lab
  labels: { app: nginx-python, role: app-server }
spec:
  replicas: 1
  selector:
    matchLabels: { app: nginx-python }
  template:
    metadata:
      labels: { app: nginx-python, role: app-server }
    spec:
      containers:
        - name: nginx-python
          image: devops-lab/nginx-python:local
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 80 }]
          resources:
            requests: { cpu: "25m", memory: "32Mi" }
            limits:   { cpu: "100m", memory: "64Mi" }
          readinessProbe:
            httpGet: { path: /health, port: 80 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-python
  namespace: devops-lab
spec:
  selector: { app: nginx-python }
  ports:
    - { port: 80, targetPort: 80 }
